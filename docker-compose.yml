services:
  app:
    image: ${APP_IMAGE}
    container_name: go-react-app
    restart: unless-stopped
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: go-react-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web

networks:
  web:
    driver: bridge
